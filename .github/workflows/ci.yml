name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      
      - run: pnpm install --frozen-lockfile
      
      - run: pnpm --filter @atlaspm/core-api prisma:generate
      
      - run: pnpm type-check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      
      - run: pnpm install --frozen-lockfile
      
      - run: pnpm lint

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: atlaspm
          POSTGRES_PASSWORD: atlaspm
          POSTGRES_DB: atlaspm
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 55432:5432
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      
      - run: pnpm install --frozen-lockfile
      
      - run: pnpm --filter @atlaspm/core-api prisma:generate
      
      - run: pnpm --filter @atlaspm/core-api prisma:migrate
        env:
          DATABASE_URL: postgresql://atlaspm:atlaspm@localhost:55432/atlaspm?schema=public
      
      - run: pnpm test
        env:
          DATABASE_URL: postgresql://atlaspm:atlaspm@localhost:55432/atlaspm?schema=public

  build:
    runs-on: ubuntu-latest
    needs: [type-check, lint]
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      
      - run: pnpm install --frozen-lockfile
      
      - run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    needs: [build, test]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Build core-api image (cached)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/core-api/Dockerfile
          tags: docker-core-api:latest
          load: true
          cache-from: type=gha,scope=e2e-core-api
          cache-to: type=gha,mode=max,scope=e2e-core-api

      - name: Build collab-server image (cached)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/collab-server/Dockerfile
          tags: docker-collab-server:latest
          load: true
          cache-from: type=gha,scope=e2e-collab-server
          cache-to: type=gha,mode=max,scope=e2e-collab-server

      - name: Build web-ui image (cached)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web-ui/Dockerfile
          tags: docker-web-ui:latest
          load: true
          cache-from: type=gha,scope=e2e-web-ui
          cache-to: type=gha,mode=max,scope=e2e-web-ui
          build-args: |
            NEXT_PUBLIC_CORE_API_URL=http://localhost:3001
            NEXT_PUBLIC_DEV_AUTH_ENABLED=true
            NEXT_PUBLIC_DEV_TOKEN_ENDPOINT=http://localhost:3001/dev-auth/token
            NEXT_PUBLIC_COLLAB_ENABLED=true
            NEXT_PUBLIC_COLLAB_SERVER_URL=ws://localhost:18080
            NEXT_PUBLIC_COLLAB_DEV_MODE=false
            NEXT_PUBLIC_TIMELINE_ENABLED=false

      - run: pnpm --filter @atlaspm/playwright exec playwright install --with-deps chromium

      - run: pnpm e2e

      - name: Upload Playwright Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: e2e/playwright/test-results
          if-no-files-found: ignore
