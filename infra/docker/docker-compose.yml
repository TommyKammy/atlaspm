services:
  postgres:
    image: postgres:16-alpine
    container_name: atlaspm-postgres
    environment:
      POSTGRES_USER: atlaspm
      POSTGRES_PASSWORD: atlaspm
      POSTGRES_DB: atlaspm
    ports:
      - '55432:5432'
    volumes:
      - atlaspm_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U atlaspm -d atlaspm']
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s

  core-api:
    build:
      context: ../..
      dockerfile: apps/core-api/Dockerfile
    container_name: atlaspm-core-api
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://atlaspm:atlaspm@postgres:5432/atlaspm?schema=public
      DEV_AUTH_ENABLED: 'true'
      DEV_AUTH_SECRET: atlaspm-e2e-dev-auth-secret-123
      DEV_AUTH_TOKEN_TTL: 8h
      COLLAB_JWT_SECRET: collab-jwt-secret-change-me
      COLLAB_SERVICE_TOKEN: collab-service-token-change-me
      COLLAB_SERVER_URL: ws://localhost:18080
      COLLAB_TOKEN_TTL_SEC: 600
      OIDC_ISSUER: https://example.okta.com/oauth2/default
      OIDC_AUDIENCE: atlaspm
      OIDC_JWKS_URI: https://example.okta.com/oauth2/default/v1/keys
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    ports:
      - '3001:3001'

  web-ui:
    build:
      context: ../..
      dockerfile: apps/web-ui/Dockerfile
      args:
        NEXT_PUBLIC_CORE_API_URL: http://localhost:3001
        NEXT_PUBLIC_DEV_AUTH_ENABLED: 'true'
        NEXT_PUBLIC_DEV_TOKEN_ENDPOINT: http://localhost:3001/dev-auth/token
        NEXT_PUBLIC_COLLAB_ENABLED: 'true'
        NEXT_PUBLIC_COLLAB_SERVER_URL: ws://localhost:18080
        NEXT_PUBLIC_COLLAB_DEV_MODE: 'false'
        NEXT_PUBLIC_TIMELINE_ENABLED: 'false'
    container_name: atlaspm-web-ui
    environment:
      NODE_ENV: development
      PORT: 3000
      NEXT_PUBLIC_CORE_API_URL: http://localhost:3001
      NEXT_PUBLIC_DEV_AUTH_ENABLED: 'true'
      NEXT_PUBLIC_DEV_TOKEN_ENDPOINT: http://localhost:3001/dev-auth/token
      NEXT_PUBLIC_COLLAB_ENABLED: 'true'
      NEXT_PUBLIC_COLLAB_SERVER_URL: ws://localhost:18080
      NEXT_PUBLIC_COLLAB_DEV_MODE: 'false'
      NEXT_PUBLIC_TIMELINE_ENABLED: 'false'
    depends_on:
      core-api:
        condition: service_started
      collab-server:
        condition: service_started
    ports:
      - '3000:3000'

  collab-server:
    build:
      context: ../..
      dockerfile: apps/collab-server/Dockerfile
    container_name: atlaspm-collab-server
    environment:
      NODE_ENV: development
      COLLAB_PORT: 8080
      CORE_API_URL: http://core-api:3001
      COLLAB_JWT_SECRET: collab-jwt-secret-change-me
      COLLAB_SERVICE_TOKEN: collab-service-token-change-me
      COLLAB_DEV_MODE: 'false'
    depends_on:
      core-api:
        condition: service_started
    ports:
      - '18080:8080'

volumes:
  atlaspm_pg_data:
